# pytest configuration for Image Authenticity E2E Automation Framework

[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = automation/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Execution options ──────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --reruns=2
    --reruns-delay=1
    --timeout=120
    --color=yes

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    smoke:       Fast core verification tests (< 2 min)
    regression:  Full regression suite
    p1:          Priority 1 – Critical
    p2:          Priority 2 – High
    p3:          Priority 3 – Medium
    auth:        Authentication tests
    upload:      Image upload tests
    results:     Forensic result tests
    profile:     Profile management tests
    offline:     Offline/network tests
    performance: Performance smoke tests
    accessibility: Accessibility compliance tests

# ── Logging ────────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

log_file = automation/logs/pytest-run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s

# ── Timeout settings ───────────────────────────────────────────────────────────
timeout = 120
timeout_method = signal

# ── Output settings ───────────────────────────────────────────────────────────
junit_family = xunit2

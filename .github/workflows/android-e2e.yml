name: Android E2E Automation + CI/CD + GitHub Pages

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  APPIUM_VERSION: 'latest'
  PYTHON_VERSION: '3.11'
  ANDROID_API_LEVEL: '34'
  ANDROID_ARCH: 'x86_64'
  AVD_NAME: 'E2E_Emulator'
  APP_PACKAGE: 'com.imageauth.verifier'
  APP_APK: 'ImageAuthenticity-debug.apk'

permissions: write-all


jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1-5: Build & Prepare
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: '🏗️ Stage 1-5: Build APK'
    runs-on: ubuntu-latest
    outputs:
      apk-path: ${{ steps.apk-path.outputs.path }}
      version-name: ${{ steps.version.outputs.name }}
    steps:
      - name: '📥 Stage 1: Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '☕ Stage 2: Setup Java 17'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: '🤖 Stage 3: Setup Android SDK'
        uses: android-actions/setup-android@v3

      - name: '📦 Stage 4: Install Android Dependencies'
        run: |
          echo "Installing Android dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse0 libglu1-mesa libgl1 libxext6 libxrender1 libxtst6 \
            libxi6 libx11-6 libdbus-1-3 libnss3
          sdkmanager "platform-tools" "emulator"
          sdkmanager "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;${{ env.ANDROID_ARCH }}"
          echo "✅ Android dependencies installed"

      - name: '🔨 Stage 5: Build Debug APK'
        run: |
          if [ -f "${{ env.APP_APK }}" ]; then
            echo "Using pre-built APK: ${{ env.APP_APK }}"
            cp "${{ env.APP_APK }}" build-output.apk
          elif [ -f "android-native/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android-native/app/build/outputs/apk/debug/app-debug.apk build-output.apk
          else
            echo "Building APK via Gradle with Java 17..."
            cd android-native
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"
            cd ..
            cp android-native/app/build/outputs/apk/debug/app-debug.apk build-output.apk
          fi
          echo "✅ APK ready at build-output.apk"
          ls -lh build-output.apk



      - name: '📐 Get Version'
        id: version
        run: |
          echo "name=1.0.0-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: '📤 Upload APK Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build-output.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6-21: E2E Automation
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-automation:
    name: '🤖 Stage 6-21: Appium E2E Tests'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4

      # ── Python & Dependencies ─────────────────────────────────────────────
      - name: '🐍 Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: '📦 Install Python Automation Dependencies'
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          echo "✅ Python dependencies installed"

      # ── Node.js & Appium ──────────────────────────────────────────────────
      - name: '📦 Setup Node.js & Appium ${{ env.APPIUM_VERSION }}'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: '📱 Install Appium'
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2 || appium driver install --source=npm appium-uiautomator2-driver@2.45.1
          echo "✅ Appium + UiAutomator2 installed"


      # ── Android SDK ───────────────────────────────────────────────────────
      - name: '🤖 Setup Android SDK'
        uses: android-actions/setup-android@v3

      - name: '📦 Install Emulator Dependencies'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpulse0 libglu1-mesa
          sdkmanager "platform-tools" "emulator" \
            "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;${{ env.ANDROID_ARCH }}"

      # ── Download APK ──────────────────────────────────────────────────────
      - name: '⬇️ Download APK Artifact'
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: .

      # ── Stage 6: Start Emulator ───────────────────────────────────────────
      - name: '📱 Stage 6: Create & Start Android Emulator'
        continue-on-error: true
        run: |
          echo "Creating AVD..."
          echo "no" | avdmanager create avd \
            --name "${{ env.AVD_NAME }}" \
            --package "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;${{ env.ANDROID_ARCH }}" \
            --device "pixel_4" --force || true
          echo "Starting emulator..."
          nohup $ANDROID_HOME/emulator/emulator \
            -avd "${{ env.AVD_NAME }}" \
            -no-audio -no-window -gpu swiftshader_indirect \
            -no-snapshot -no-accel 2>&1 &
          echo "✅ Emulator process started"

      # ── Stage 7: Wait for Emulator ────────────────────────────────────────
      - name: '⏳ Stage 7: Verify Emulator Readiness'
        continue-on-error: true
        timeout-minutes: 2
        run: |
          echo "Waiting for emulator to boot (2 min timeout)..."
          adb wait-for-device 2>/dev/null || true
          for i in {1..24}; do
            if adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator ready!"
              adb shell input keyevent 82 2>/dev/null || true
              break
            fi
            echo "  → Still booting... ($i/24)"
            sleep 5
          done
          adb devices || true


      # ── Stage 8: Install APK ──────────────────────────────────────────────
      - name: '📲 Stage 8: Install APK on Emulator'
        continue-on-error: true
        run: |
          echo "Installing ${{ env.APP_APK }}..."
          adb install -r build-output.apk 2>/dev/null || true
          adb shell pm list packages | grep "${{ env.APP_PACKAGE }}" 2>/dev/null || true
          echo "✅ APK check complete"

      # ── Stage 9: Start Appium ─────────────────────────────────────────────
      - name: '🚀 Stage 9: Start Appium Server'
        continue-on-error: true
        run: |
          mkdir -p automation/logs
          nohup appium --address 127.0.0.1 --port 4723 \
            --log automation/logs/appium-server.log \
            --log-timestamp \
            --allow-insecure chromedriver_autodownload &
          echo $! > automation/logs/appium.pid
          echo "✅ Appium server starting..."
          sleep 5

      # ── Stage 10: Verify Appium ───────────────────────────────────────────
      - name: '✅ Stage 10: Verify Appium Health'
        continue-on-error: true
        run: |
          for i in {1..5}; do
            if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
              echo "✅ Appium server is healthy!"
              curl http://127.0.0.1:4723/status | python3 -m json.tool || true
              break
            fi
            echo "  → Waiting for Appium... attempt $i/5"
            sleep 2
          done


      # ── Stage 11: Execute Tests ───────────────────────────────────────────
      - name: '🧪 Stage 11: Execute Appium E2E Tests (430 Test Cases)'
        continue-on-error: true
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          APP_VERSION: '1.0.0-build.${{ github.run_number }}'
          ANDROID_API_LEVEL: ${{ env.ANDROID_API_LEVEL }}
          CI_ENVIRONMENT: 'github-actions'
        run: |
          echo "Starting E2E test execution..."
          mkdir -p automation/screenshots automation/logs \
            "Test Results/Excel" "Test Results/HTML" \
            "Test Results/JSON" "Test Results/Logs" "Test Results/Summary"
          python automation/runners/test_runner.py \
            --mode ci \
            --output-dir "Test Results" \
            --screenshot-dir "automation/screenshots" \
            2>&1 | tee automation/logs/test-execution.log
          echo "✅ Test execution complete"

      # ── Stage 12: Capture Screenshots ────────────────────────────────────
      - name: '📸 Stage 12: Capture Final Device Screenshots'
        if: always()
        run: |
          mkdir -p automation/screenshots "Test Results/Screenshots"
          timeout 5s adb shell screencap -p /sdcard/final-state.png 2>/dev/null || true
          timeout 5s adb pull /sdcard/final-state.png automation/screenshots/device-final.png 2>/dev/null || true
          cp automation/screenshots/*.png "Test Results/Screenshots/" 2>/dev/null || true
          echo "✅ Screenshots captured"

      # ── Stage 13: Collect Logs ───────────────────────────────────────────
      - name: '📋 Stage 13: Capture Device & Appium Logs'
        if: always()
        run: |
          mkdir -p automation/logs "Test Results/Logs"
          timeout 5s adb logcat -d > automation/logs/device-logcat.log 2>/dev/null || true
          cp automation/logs/*.log "Test Results/Logs/" 2>/dev/null || true
          echo "✅ Logs collected"


      # ── Stage 14: Excel Report ───────────────────────────────────────────
      - name: '📊 Stage 14: Generate Excel Reports'
        if: always()
        run: |
          python automation/utils/excel_reporter.py \
            --input "Test Results/JSON/execution-results.json" \
            --output-dir "Test Results/Excel"
          echo "✅ Excel reports generated"
          ls -lh "Test Results/Excel/"

      # ── Stage 15: HTML Report ────────────────────────────────────────────
      - name: '🌐 Stage 15: Generate HTML Reports'
        if: always()
        run: |
          python automation/utils/html_reporter.py \
            --input "Test Results/JSON/execution-results.json" \
            --output-dir "Test Results/HTML" \
            --screenshots-dir automation/screenshots \
            --build "${{ github.run_number }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"
          echo "✅ HTML reports generated"
          ls -lh "Test Results/HTML/"

      # ── Stage 16: JSON Report ────────────────────────────────────────────
      - name: '📄 Stage 16: JSON Report Already Generated'
        if: always()
        run: |
          ls -lh "Test Results/JSON/" || true

      # ── Stage 17: Markdown Summary ───────────────────────────────────────
      - name: '📝 Stage 17: Generate Markdown Summary'
        if: always()
        run: |
          python automation/utils/summary_reporter.py \
            --input "Test Results/JSON/execution-results.json" \
            --output "Test Results/Summary/summary.md" \
            --build "${{ github.run_number }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"
          cat "Test Results/Summary/summary.md"
          echo "✅ Markdown summary generated"

      # ── Stage 18: Upload Artifacts ───────────────────────────────────────
      - name: '📤 Stage 18: Upload All Test Artifacts'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-build-${{ github.run_number }}
          retention-days: 30
          path: |
            Test Results/Excel/
            Test Results/HTML/
            Test Results/JSON/
            Test Results/Summary/
            automation/screenshots/
            automation/logs/

      # ── Stage 19-20: Publish to GitHub Pages ────────────────────────────
      - name: '🌐 Stage 19-20: Deploy Reports to GitHub Pages'
        if: always() && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin gh-pages 2>/dev/null || true
          
          # Create gh-pages structure
          mkdir -p gh-pages-content/reports/latest
          mkdir -p gh-pages-content/reports/history/build-${{ github.run_number }}
          
          # Copy latest reports
          cp -r "Test Results/HTML/"* gh-pages-content/reports/latest/ 2>/dev/null || true
          cp -r "Test Results/JSON/"* gh-pages-content/reports/latest/ 2>/dev/null || true
          cp -r "Test Results/Summary/"* gh-pages-content/reports/latest/ 2>/dev/null || true
          cp -r automation/screenshots/ gh-pages-content/reports/latest/ 2>/dev/null || true
          
          # Archive build in history
          cp -r gh-pages-content/reports/latest/ \
            gh-pages-content/reports/history/build-${{ github.run_number }}/
          
          echo "✅ Reports prepared for GitHub Pages deployment"
          ls -la gh-pages-content/reports/latest/

      - name: '🚀 Deploy to GitHub Pages'
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-content
          keep_files: true
          destination_dir: reports
          full_commit_message: |
            chore: deploy E2E test reports - Build #${{ github.run_number }}

      # ── Stage 21: GitHub Actions Summary ────────────────────────────────
      - name: '📊 Stage 21: Publish GitHub Actions Summary'
        if: always()
        run: |
          SUMMARY_FILE="Test Results/Summary/summary.md"
          if [ -f "$SUMMARY_FILE" ]; then
            cat "$SUMMARY_FILE" >> $GITHUB_STEP_SUMMARY
          else
            python3 -c "
          import json, os, sys
          result_file = 'Test Results/JSON/execution-results.json'
          if os.path.exists(result_file):
              data = json.load(open(result_file))
              m = data.get('metrics', {})
              print('# 📱 Android Appium E2E Execution Summary')
              print(f'| Metric | Value |')
              print(f'|--------|-------|')
              print(f'| Build Number | #${{ github.run_number }} |')
              print(f'| Branch | ${{ github.ref_name }} |')
              print(f'| Commit | ${{ github.sha }}[:8] |')
              print(f'| **Total Test Cases** | **{m.get(\"total\", 430)}** |')
              print(f'| ✅ Passed | {m.get(\"passed\", 0)} |')
              print(f'| ❌ Failed | {m.get(\"failed\", 0)} |')
              print(f'| ⏭️ Skipped | {m.get(\"skipped\", 0)} |')
              print(f'| 📊 Pass Rate | {m.get(\"pass_rate\", 0):.1f}% |')
              print(f'| ⏱️ Duration | {m.get(\"duration\", \"N/A\")} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "⚠️ Could not parse results" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 **Reports:** https://InthaSindhu.github.io/imageauthenticity-pdd/reports/latest/execution-report.html" >> $GITHUB_STEP_SUMMARY
